<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Signal Lost</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .bg-animation {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.1), transparent 50%);
            z-index: -1;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(0.8); opacity: 0.5; }
            to { transform: scale(1.2); opacity: 1; }
        }

        .container {
            padding: 40px;
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1);
        }

        h1 {
            font-size: 100px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00f3ff, #bc13fe);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            line-height: 1;
        }

        p {
            font-size: 20px;
            color: #a0a0b0;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: transparent;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid #00f3ff;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        a:hover {
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            transform: translateY(-2px);
        }

        .icon {
            font-size: 60px;
            color: #00f3ff;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px #00f3ff);
            animation: float 3s ease-in-out infinite alternate;
        }

        @keyframes float {
            from { transform: translateY(0px) rotate(0deg); }
            to { transform: translateY(-10px) rotate(5deg); }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <div class="icon">
            <i class="fas fa-satellite-dish"></i>
        </div>
        <h1>404</h1>
        <p>Signal Lost / Page Not Found</p>
        <a href="/"><i class="fas fa-home"></i> Return to Base</a>
    </div>
</body>
</html>
