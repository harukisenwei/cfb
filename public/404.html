<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Signal Lost</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, rgba(20, 20, 30, 1), #050505);
            overflow: hidden;
        }

        .cyber-grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: -1;
            opacity: 0.6;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 50px; }
        }

        .glowing-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            animation: orbFloat 15s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(188, 19, 254, 0.2);
            top: -100px; left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px; height: 500px;
            background: rgba(0, 243, 255, 0.15);
            bottom: -200px; right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px; height: 300px;
            background: rgba(255, 0, 85, 0.15);
            top: 40%; left: 60%;
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -50px) scale(1.1); }
            66% { transform: translate(-30px, 40px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .floating-shape {
            position: absolute;
            border: 2px solid rgba(0, 243, 255, 0.3);
            z-index: -1;
            animation: shapeFloat 20s linear infinite;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2) inset, 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .shape-square {
            width: 100px; height: 100px;
            top: 20%; left: 10%;
            animation-duration: 25s;
        }

        .shape-circle {
            width: 150px; height: 150px;
            border-radius: 50%;
            border-color: rgba(188, 19, 254, 0.3);
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.2) inset, 0 0 15px rgba(188, 19, 254, 0.2);
            bottom: 20%; right: 15%;
            animation-duration: 30s;
            animation-direction: reverse;
        }

        .shape-triangle {
            width: 0; height: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 100px solid rgba(255, 0, 85, 0.2);
            border-top: none;
            background: transparent;
            box-shadow: none;
            filter: drop-shadow(0 0 10px rgba(255, 0, 85, 0.4));
            top: 60%; left: 30%;
            animation-duration: 22s;
        }

        @keyframes shapeFloat {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 0.5; }
            50% { transform: translateY(-50vh) rotate(180deg) scale(1.2); opacity: 0.8; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) rotate(360deg) scale(1); opacity: 0; }
        }

        .container {
            padding: 40px;
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.1);
        }

        h1 {
            font-size: 100px;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00f3ff, #bc13fe);
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            line-height: 1;
        }

        p {
            font-size: 20px;
            color: #a0a0b0;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: transparent;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid #00f3ff;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        a:hover {
            background: rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            transform: translateY(-2px);
        }

        .icon {
            font-size: 60px;
            color: #00f3ff;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px #00f3ff);
            animation: float 3s ease-in-out infinite alternate;
        }

        @keyframes float {
            from { transform: translateY(0px) rotate(0deg); }
            to { transform: translateY(-10px) rotate(5deg); }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="cyber-grid"></div>
        <div class="glowing-orb orb-1"></div>
        <div class="glowing-orb orb-2"></div>
        <div class="glowing-orb orb-3"></div>
        <div class="floating-shape shape-square"></div>
        <div class="floating-shape shape-circle"></div>
        <div class="floating-shape shape-triangle"></div>
        
        <script>
            const bgContainer = document.querySelector('.bg-animation');
            for(let i=0; i<20; i++) {
                let particle = document.createElement('div');
                particle.className = 'floating-shape';
                
                let size = Math.random() * 40 + 10;
                let isCircle = Math.random() > 0.5;
                let color = Math.random() > 0.6 ? 'rgba(0, 243, 255, 0.2)' : (Math.random() > 0.5 ? 'rgba(188, 19, 254, 0.2)' : 'rgba(255, 0, 85, 0.2)');
                
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.bottom = '-100px';
                particle.style.borderColor = color;
                particle.style.boxShadow = `0 0 10px ${color} inset, 0 0 10px ${color}`;
                
                if(isCircle) particle.style.borderRadius = '50%';
                
                particle.style.animationDuration = (Math.random() * 20 + 20) + 's';
                particle.style.animationDelay = (Math.random() * 20) + 's';
                
                bgContainer.appendChild(particle);
            }
        </script>
    </div>
    <div class="container">
        <div class="icon">
            <i class="fas fa-satellite-dish"></i>
        </div>
        <h1>404</h1>
        <p>Signal Lost / Page Not Found</p>
        <a href="/"><i class="fas fa-home"></i> Return to Base</a>
    </div>
</body>
</html>
