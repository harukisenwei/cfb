<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Failure</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .bg-animation {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 0, 85, 0.15), transparent 60%);
            z-index: -1;
            animation: glitch 0.5s infinite alternate;
        }

        @keyframes glitch {
            0% { opacity: 0.8; transform: translate(2px, 2px); }
            100% { opacity: 1; transform: translate(-2px, -2px); }
        }

        .container {
            padding: 40px;
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 0, 85, 0.3);
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.15);
        }

        h1 {
            font-size: 100px;
            font-weight: 800;
            margin-bottom: 10px;
            color: #ff0055;
            text-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
            line-height: 1;
            position: relative;
        }

        p {
            font-size: 20px;
            color: #a0a0b0;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            background: transparent;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            border: 1px solid #ff0055;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        a:hover {
            background: rgba(255, 0, 85, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
            transform: translateY(-2px);
        }

        .icon {
            font-size: 60px;
            color: #ff0055;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px #ff0055);
            animation: shock 1s infinite alternate;
        }

        @keyframes shock {
            0%, 90% { transform: scale(1); }
            95% { transform: scale(1.1) rotate(-5deg); filter: hue-rotate(90deg); }
            100% { transform: scale(0.9) rotate(5deg); }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <div class="icon">
            <i class="fas fa-biohazard"></i>
        </div>
        <h1>500</h1>
        <p>Critical Server Failure / System offline</p>
        <a href="/"><i class="fas fa-undo"></i> Reboot Node</a>
    </div>
</body>
</html>
